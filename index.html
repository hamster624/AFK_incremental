<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AFK Incremental</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>AFK Incremental</h1>
  <div id="value">2</div>
  <div id="rebirths">Rebirths: 0</div>
  <div id="Multi">Multi: 2</div>
  <div id="Formula">10^^(slog(value)*1.001)</div>
  <div class="upgrade">
    <button onclick="buyUpgrade1()">Upgrade 1: Increase multiplier by +0.001 | Cost: <span id="upg1Cost">2</span></button>
  </div>
  <div class="upgrade">
    <button onclick="buyUpgrade2()">Upgrade 2: Increase the multiplier by +0.004 | Cost: <span id="upg2Cost">10</span></button>
  </div>  
  <button onclick="rebirth()">Rebirth (Cost:1F10)</button>
  <button onclick="resetGame()">Reset Game</button>
  <div id="willgainreb">Will gain rebirths:</div>

  <script src="ExpantaNum.js"></script>
  <script src="format.js"></script>
  <script src="main.js"></script>
</body>
</html>
